databaseChangeLog:
  - changeSet:
      id: 001
      author: Anton_Kaliadau
      changes:
        - createTable:
            tableName: hotel
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: brand, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: description, type: TEXT, constraints: { nullable: false } }
              - column: { name: phone, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: house_number, type: INT }
              - column: { name: street, type: VARCHAR(255) }
              - column: { name: city, type: VARCHAR(100) }
              - column: { name: country, type: VARCHAR(100) }
              - column: { name: post_code, type: VARCHAR(20) }
              - column: { name: email, type: VARCHAR(255) }
              - column: { name: check_in, type: VARCHAR(10) }
              - column: { name: check_out, type: VARCHAR(10) }

        - createTable:
            tableName: hotel_amenities
            columns:
              - column:
                  name: hotel_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_hotel_amenities
                    referencedTableName: hotel
                    referencedColumnNames: id
              - column:
                  name: amenities
                  type: VARCHAR(255)